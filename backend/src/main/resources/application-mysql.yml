spring:
  datasource:
    url: ${MYSQL_DATABASE_URL:jdbc:mysql://localhost:3306/supergestor?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:}
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
