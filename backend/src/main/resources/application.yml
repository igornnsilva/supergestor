server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: supergestor
  datasource:
    url: jdbc:h2:mem:supergestor
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  security:
    jwt:
      secret: ${JWT_SECRET:supergestor-dev-secret-key-change-me-please-123456789}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}
